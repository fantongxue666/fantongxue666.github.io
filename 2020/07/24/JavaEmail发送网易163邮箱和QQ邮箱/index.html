span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@Component</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">EmailUtil</span> </span>&#123;</span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * todo 发送QQ邮箱</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">sendQQEmail</span><span class="params">(String emailAddress)</span></span>&#123;</span><br><span class="line">        <span class="comment">//做链接前的准备工作  也就是参数初始化</span></span><br><span class="line">        Properties properties = <span class="keyword">new</span> Properties();</span><br><span class="line">        properties.setProperty(<span class="string">&quot;mail.smtp.host&quot;</span>,<span class="string">&quot;smtp.qq.com&quot;</span>);<span class="comment">//发送邮箱服务器</span></span><br><span class="line">        properties.setProperty(<span class="string">&quot;mail.smtp.port&quot;</span>,<span class="string">&quot;465&quot;</span>);<span class="comment">//发送端口</span></span><br><span class="line">        properties.setProperty(<span class="string">&quot;mail.smtp.auth&quot;</span>,<span class="string">&quot;true&quot;</span>);<span class="comment">//是否开启权限控制</span></span><br><span class="line">        properties.setProperty(<span class="string">&quot;mail.debug&quot;</span>,<span class="string">&quot;true&quot;</span>);<span class="comment">//true 打印信息到控制台</span></span><br><span class="line">        properties.setProperty(<span class="string">&quot;mail.transport&quot;</span>,<span class="string">&quot;smtp&quot;</span>);<span class="comment">//发送的协议是简单的邮件传输协议</span></span><br><span class="line">        properties.setProperty(<span class="string">&quot;mail.smtp.ssl.enable&quot;</span>,<span class="string">&quot;true&quot;</span>);</span><br><span class="line">        <span class="comment">//建立两点之间的链接</span></span><br><span class="line">        Session session = Session.getInstance(properties, <span class="keyword">new</span> Authenticator() &#123;</span><br><span class="line">            <span class="meta">@Override</span></span><br><span class="line">            <span class="function"><span class="keyword">protected</span> PasswordAuthentication <span class="title">getPasswordAuthentication</span><span class="params">()</span> </span>&#123;</span><br><span class="line">                <span class="keyword">return</span> <span class="keyword">new</span> PasswordAuthentication(<span class="string">&quot;675361896@qq.com&quot;</span>,<span class="string">&quot;wbomvmxtifjybcbb&quot;</span>);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;);</span><br><span class="line">        <span class="comment">//创建邮件对象</span></span><br><span class="line">        Message message = <span class="keyword">new</span> MimeMessage(session);</span><br><span class="line">        <span class="comment">//设置发件人</span></span><br><span class="line">        <span class="keyword">try</span> &#123;</span><br><span class="line">            message.setFrom(<span class="keyword">new</span> InternetAddress(<span class="string">&quot;675361896@qq.com&quot;</span>));</span><br><span class="line"></span><br><span class="line">            <span class="comment">//设置收件人</span></span><br><span class="line">            message.setRecipient(Message.RecipientType.TO,<span class="keyword">new</span> InternetAddress(emailAddress));<span class="comment">//收件人</span></span><br><span class="line">            <span class="comment">//设置主题</span></span><br><span class="line">            message.setSubject(<span class="string">&quot;Activiti工作流审核结果通知&quot;</span>);</span><br><span class="line">            <span class="comment">//设置邮件正文  第二个参数是邮件发送的类型</span></span><br><span class="line">            message.setContent(<span class="string">&quot;尊敬的用户您好，您的请假申请已通过，请知悉！&quot;</span>,<span class="string">&quot;text/html;charset=UTF-8&quot;</span>);</span><br><span class="line">            <span class="comment">//发送一封邮件</span></span><br><span class="line">            Transport transport = session.getTransport();</span><br><span class="line">            transport.connect(<span class="string">&quot;675361896@qq.com&quot;</span>,<span class="string">&quot;wbomvmxtifjybcbb&quot;</span>);</span><br><span class="line">            Transport.send(message);</span><br><span class="line">        &#125; <span class="keyword">catch</span> (MessagingException e) &#123;</span><br><span class="line">            e.printStackTrace();</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * todo 发送网易163邮箱</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="comment">// 发件人 账号和密码</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> String MY_EMAIL_ACCOUNT = <span class="string">&quot;fantongxue666@163.com&quot;</span>;</span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> String MY_EMAIL_PASSWORD = <span class="string">&quot;PCRAVAFQNZVIJDOI&quot;</span>;<span class="comment">// 密码,是你自己的设置的授权码</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// SMTP服务器(这里用的163 SMTP服务器)</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> String MEAIL_163_SMTP_HOST = <span class="string">&quot;smtp.163.com&quot;</span>;</span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> String SMTP_163_PORT = <span class="string">&quot;25&quot;</span>;<span class="comment">// 端口号,这个是163使用到的;QQ的应该是465或者875</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 收件人</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> String RECEIVE_EMAIL_ACCOUNT = <span class="string">&quot;fantongxue666@163.com&quot;</span>;</span><br><span class="line"></span><br><span class="line">    <span class="meta">@Test</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">sendWY163Email</span><span class="params">(String emailAddress)</span> <span class="keyword">throws</span> Exception</span>&#123;</span><br><span class="line">        Properties p = <span class="keyword">new</span> Properties();</span><br><span class="line">        p.setProperty(<span class="string">&quot;mail.smtp.host&quot;</span>, MEAIL_163_SMTP_HOST);</span><br><span class="line">        p.setProperty(<span class="string">&quot;mail.smtp.port&quot;</span>, SMTP_163_PORT);</span><br><span class="line">        p.setProperty(<span class="string">&quot;mail.smtp.socketFactory.port&quot;</span>, SMTP_163_PORT);</span><br><span class="line">        p.setProperty(<span class="string">&quot;mail.smtp.auth&quot;</span>, <span class="string">&quot;true&quot;</span>);</span><br><span class="line">        p.setProperty(<span class="string">&quot;mail.smtp.socketFactory.class&quot;</span>, <span class="string">&quot;SSL_FACTORY&quot;</span>);</span><br><span class="line"></span><br><span class="line">        Session session = Session.getInstance(p, <span class="keyword">new</span> Authenticator() &#123;</span><br><span class="line">            <span class="comment">// 设置认证账户信息</span></span><br><span class="line">            <span class="meta">@Override</span></span><br><span class="line">            <span class="function"><span class="keyword">protected</span> PasswordAuthentication <span class="title">getPasswordAuthentication</span><span class="params">()</span> </span>&#123;</span><br><span class="line">                <span class="keyword">return</span> <span class="keyword">new</span> PasswordAuthentication(MY_EMAIL_ACCOUNT, MY_EMAIL_PASSWORD);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;);</span><br><span class="line">        session.setDebug(<span class="keyword">true</span>);</span><br><span class="line">        MimeMessage message = <span class="keyword">new</span> MimeMessage(session);</span><br><span class="line">        <span class="comment">// 发件人</span></span><br><span class="line">        message.setFrom(<span class="keyword">new</span> InternetAddress(MY_EMAIL_ACCOUNT));</span><br><span class="line">        <span class="comment">// 收件人和抄送人</span></span><br><span class="line">        message.setRecipients(Message.RecipientType.TO, RECEIVE_EMAIL_ACCOUNT);</span><br><span class="line"><span class="comment">//		message.setRecipients(Message.RecipientType.CC, MY_EMAIL_ACCOUNT);</span></span><br><span class="line"></span><br><span class="line">        <span class="comment">// 内容(这个内容还不能乱写,有可能会被SMTP拒绝掉;多试几次吧)</span></span><br><span class="line">        message.setSubject(<span class="string">&quot;Activiti工作流审核结果通知&quot;</span>);</span><br><span class="line">        message.setContent(<span class="string">&quot;尊敬的用户您好，您的请假申请已通过，请知悉！&quot;</span>, <span class="string">&quot;text/html;charset=UTF-8&quot;</span>);</span><br><span class="line">        message.setSentDate(<span class="keyword">new</span> Date());</span><br><span class="line">        message.saveChanges();</span><br><span class="line">        Transport.send(message);</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
